<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>多人配音工具 v1.0.0</title>
    <style>
      /* 启动防闪：在 Vue/CSS 加载前就铺好主题底色 */
      html, body, #app {
        margin: 0;
        width: 100%;
        height: 100%;
        max-height: 100%;
        overflow: hidden;
        background: #f4f2fb;
      }
    </style>
    <script>
      // 尽早应用上次选择的主题底色，避免 pywebview 黑底 → 浅色界面的闪屏
      (function () {
        var bgs = {
          lilac: '#f4f2fb',
          peach: '#fff5f1',
          mint: '#f0faf5',
          sky: '#f2f7fd',
          rose: '#fdf2f6',
          lemon: '#fbf9ef',
          lavender: '#f3f3f7',
          ink: '#0e0f13'
        }
        try {
          var id = localStorage.getItem('voicegen_theme') || 'lilac'
          var bg = bgs[id] || bgs.lilac
          document.documentElement.setAttribute('data-theme', id)
          document.documentElement.style.background = bg
          document.documentElement.style.colorScheme = id === 'ink' ? 'dark' : 'light'
          var applyBody = function () {
            if (document.body) {
              document.body.style.background = bg
              document.body.style.margin = '0'
            }
          }
          if (document.body) applyBody()
          else document.addEventListener('DOMContentLoaded', applyBody)
        } catch (e) {}
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
